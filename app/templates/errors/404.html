{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="text-center py-5">
    <i class="fa-solid fa-map-signs fa-3x text-secondary mb-3"></i>
    <h1 class="fw-bold display-4">404</h1>
    <p class="text-muted">{{ message or "The page you requested was not found." }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">Return Home</a>
</div>
{% endblock %}
