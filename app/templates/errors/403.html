{% extends "base.html" %}
{% block title %}Forbidden{% endblock %}
{% block content %}
<div class="text-center py-5">
    <i class="fa-solid fa-lock fa-3x text-danger mb-3"></i>
    <h1 class="fw-bold display-4">403</h1>
    <p class="text-muted">{{ message or "You do not have permission to access this page." }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">Return Home</a>
</div>
{% endblock %}
