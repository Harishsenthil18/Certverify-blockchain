{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="text-center py-5">
    <i class="fa-solid fa-server fa-3x text-danger mb-3"></i>
    <h1 class="fw-bold display-4">500</h1>
    <p class="text-muted">{{ message or "An unexpected error occurred. Please try again shortly." }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">Return Home</a>
</div>
{% endblock %}
