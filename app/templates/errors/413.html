{% extends "base.html" %}
{% block title %}File Too Large{% endblock %}
{% block content %}
<div class="text-center py-5">
    <i class="fa-solid fa-file-circle-exclamation fa-3x text-warning mb-3"></i>
    <h1 class="fw-bold display-4">413</h1>
    <p class="text-muted">{{ message or "The uploaded file is too large." }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">Return Home</a>
</div>
{% endblock %}
